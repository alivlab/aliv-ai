<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aliv</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient"></div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">A</div>
        <span>Aliv</span>
      </div>
      <div class="status">● aktif</div>
    </header>

    <section class="intro">
      <p class="eyebrow">AI çalışma alanı</p>
      <h1>Ne üretmek istiyorsun?</h1>
      <p class="sub">Soru sor, metin yazdır, kod üret, dosya yükle veya fikrini geliştir.</p>
    </section>

    <section class="chat">
      <div id="messages" class="messages">
        <div class="hint">
          <b>Başlamak için yaz:</b>
          “Bana sade bir portfolyo sitesi hazırla”
        </div>
      </div>

      <div id="filePreview" class="file-preview"></div>

      <div class="composer">
        <button class="icon-btn" id="fileBtn" title="Dosya ekle">＋</button>
        <input id="fileInput" type="file" hidden accept="image/*,.txt,.pdf,.doc,.docx" />

        <textarea id="message" placeholder="Mesaj yaz..." rows="1"></textarea>

        <button class="send-btn" id="sendBtn" title="Gönder">
          ➤
        </button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

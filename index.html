<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aliv</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="/cover.jpg" alt="Aliv logo" />
      <span>ALIV</span>
    </div>

    <button class="new-chat" onclick="newChat()">+ Yeni sohbet</button>

    <div class="side-note">
      Görsel analiz, fikir, metin, kod ve problem çözümü.
    </div>
  </aside>

  <main class="chat-page">
    <header class="chat-header">
      <div>
        <h1>Aliv</h1>
        <p>Sor, üret, geliştir.</p>
      </div>
    </header>

    <section id="messages" class="messages">
      <div class="empty">
        <img src="/cover.jpg" alt="Aliv" />
        <h2>Bugün ne üretelim?</h2>
        <p>Bir görsel yükle, fikir anlat veya doğrudan yaz.</p>
      </div>
    </section>

    <div id="filePreview" class="file-preview"></div>

    <section class="composer-wrap">
      <div class="composer">
        <button id="fileBtn" class="tool-btn" title="Dosya ekle">＋</button>
        <input id="fileInput" type="file" hidden accept="image/*,.txt,.pdf,.doc,.docx" />

        <textarea id="message" placeholder="Mesaj yaz..." rows="1"></textarea>

        <button id="sendBtn" class="send-btn" title="Gönder">➤</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
